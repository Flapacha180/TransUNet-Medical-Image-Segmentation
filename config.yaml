# TransUNet Hyperparameters - Synapse Multi-organ Segmentation
# Result: mean_dice=77.29%, mean_hd95=30.71 (paper: 77.48%, 31.92)

# Model
vit_name: R50-ViT-B_16
vit_patches_size: 16
n_skip: 3
img_size: 224
num_classes: 9

# Training
max_epochs: 150
max_iterations: 30000
batch_size: 24
base_lr: 0.01
seed: 1234
deterministic: 1

# Dataset
dataset: Synapse

# SageMaker (training job: lab-training-mla-v6)
instance_type: ml.g4dn.4xlarge
framework_version: "1.13"
py_version: py39
